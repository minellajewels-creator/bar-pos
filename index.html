
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velvet Barrel POS</title>
  <meta name="description" content="Bar Point-of-Sale System" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone (transpiles JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jsPDF (bill PDF generation) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0A0A0F; color: #E8E8F0; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A0F; }
    ::-webkit-scrollbar-thumb { background: #2A2A3E; border-radius: 4px; }
    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    input, select, textarea {
      background: #13131A; border: 1px solid #2A2A3E;
      color: #E8E8F0; border-radius: 8px; padding: 8px 12px;
      font-family: inherit; font-size: 13px; outline: none;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: #F5A623; }
    button { cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useMemo } = React;

    // ── CONFIG ── change these before deploying ──────────────────────────────
    const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";
    const GST_RATE = 0.18;

    // ── MOCK DATA (remove once Apps Script is wired up) ──────────────────────
    const MOCK_INVENTORY = [
      { id:"LQ-0001", name:"Jack Daniel's",  category:"Liquor",   imageUrl:"", price30ml:120, priceBottle:2800, mlPerBottle:750, qty:5,  lowStockThreshold:2, active:true },
      { id:"LQ-0002", name:"Royal Stag",     category:"Liquor",   imageUrl:"", price30ml:60,  priceBottle:1200, mlPerBottle:750, qty:12, lowStockThreshold:3, active:true },
      { id:"BV-0001", name:"Coca Cola",      category:"Beverage", imageUrl:"", price30ml:0,   priceBottle:60,   mlPerBottle:300, qty:24, lowStockThreshold:5, active:true },
      { id:"BV-0002", name:"Soda Water",     category:"Beverage", imageUrl:"", price30ml:0,   priceBottle:30,   mlPerBottle:300, qty:30, lowStockThreshold:10,active:true },
      { id:"LQ-0003", name:"Old Monk",       category:"Liquor",   imageUrl:"", price30ml:40,  priceBottle:900,  mlPerBottle:750, qty:2,  lowStockThreshold:3, active:true },
    ];
    const MOCK_SETTINGS = {
      barName:"THE VELVET BARREL",
      barAddress:"12, Race Course Road, Coimbatore – 641018",
      gstNumber:"33AABCT1332L1ZN",
      gstRate:18,
      githubOwner:"your-username",
      githubRepo:"bar-assets",
      githubToken:"ghp_xxxx",
      logoPath:"assets/logo.png",
      tables:"T1,T2,T3,T4,T5,T6,T7,T8",
      currency:"₹",
    };

    // ── GITHUB IMAGE UPLOAD ──────────────────────────────────────────────────
    function fileToBase64(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }
    async function uploadToGithub(file, itemId, settings) {
      const { githubOwner, githubRepo, githubToken } = settings;
      const base64 = await fileToBase64(file);
      const path = `images/${itemId}.jpg`;
      const res = await fetch(
        `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${path}`,
        {
          method: "PUT",
          headers: { Authorization: `token ${githubToken}`, "Content-Type": "application/json" },
          body: JSON.stringify({ message: `Add image for ${itemId}`, content: base64.split(",")[1] }),
        }
      );
      const json = await res.json();
      return json.content?.download_url || "";
    }

    // ── PDF BILL ─────────────────────────────────────────────────────────────
    function generateBillPDF(bill, settings) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:"mm", format:"a4" });
      const W = 210, M = 15;
      let y = 20;

      doc.setFillColor(10,10,15);
      doc.rect(0,0,W,40,"F");
      doc.setTextColor(245,166,35);
      doc.setFontSize(22); doc.setFont("helvetica","bold");
      doc.text(settings.barName||"THE BAR", W/2, 18, { align:"center" });
      doc.setFontSize(9); doc.setTextColor(200,200,200);
      doc.text(settings.barAddress||"", W/2, 25, { align:"center" });
      doc.text(`GSTIN: ${settings.gstNumber||""}`, W/2, 31, { align:"center" });

      y = 50;
      doc.setTextColor(20,20,20); doc.setFontSize(10); doc.setFont("helvetica","normal");
      doc.text(`Bill No: ${bill.billId}`, M, y);
      doc.text(`Date: ${bill.dateTime}`, W-M, y, { align:"right" });
      y+=6;
      doc.text(`Table: ${bill.tableNumber}`, M, y);
      doc.text(`Customer: ${bill.customerName}`, W-M, y, { align:"right" });
      y+=4;
      doc.setDrawColor(200,200,200); doc.line(M,y,W-M,y); y+=6;

      doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.text("ITEM",M,y); doc.text("QTY",110,y,{align:"right"});
      doc.text("RATE",140,y,{align:"right"}); doc.text("AMOUNT",W-M,y,{align:"right"});
      y+=4; doc.line(M,y,W-M,y); y+=5;

      doc.setFont("helvetica","normal");
      bill.items.forEach(item => {
        doc.text(item.name,M,y);
        doc.text(`${item.qty} ${item.unit}`,110,y,{align:"right"});
        doc.text(`₹${item.rate.toFixed(2)}`,140,y,{align:"right"});
        doc.text(`₹${item.lineTotal.toFixed(2)}`,W-M,y,{align:"right"});
        y+=6;
      });

      doc.line(M,y,W-M,y); y+=6;
      doc.text("Subtotal",140,y,{align:"right"});
      doc.text(`₹${bill.subtotal.toFixed(2)}`,W-M,y,{align:"right"}); y+=5;
      doc.text("CGST (9%)",140,y,{align:"right"});
      doc.text(`₹${(bill.gstAmount/2).toFixed(2)}`,W-M,y,{align:"right"}); y+=5;
      doc.text("SGST (9%)",140,y,{align:"right"});
      doc.text(`₹${(bill.gstAmount/2).toFixed(2)}`,W-M,y,{align:"right"}); y+=4;
      doc.line(M,y,W-M,y); y+=6;
      doc.setFont("helvetica","bold"); doc.setFontSize(12);
      doc.text("GRAND TOTAL",140,y,{align:"right"});
      doc.text(`₹${bill.total.toFixed(2)}`,W-M,y,{align:"right"}); y+=10;
      doc.setFont("helvetica","italic"); doc.setFontSize(9); doc.setTextColor(100,100,100);
      doc.text("Thank you for visiting! Please drink responsibly.", W/2, y, {align:"center"});
      doc.save(`Bill-${bill.billId}.pdf`);
    }

    // ── TOAST HOOK ───────────────────────────────────────────────────────────
    function useToast() {
      const [toasts, setToasts] = useState([]);
      const toast = useCallback((msg, type="info") => {
        const id = Date.now();
        setToasts(p => [...p, { id, msg, type }]);
        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
      }, []);
      return { toasts, toast };
    }

    function ToastContainer({ toasts }) {
      const colors = { info:"#F5A623", success:"#3DD410", error:"#E85D5D" };
      return (
        <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8}}>
          {toasts.map(t => (
            <div key={t.id} style={{
              background:"#1E1E2E", borderLeft:`3px solid ${colors[t.type]}`,
              color:"#E8E8F0", padding:"10px 16px", borderRadius:8,
              fontSize:13, maxWidth:320, animation:"slideIn 0.2s ease",
            }}>{t.msg}</div>
          ))}
        </div>
      );
    }

    // ── SHARED UI ────────────────────────────────────────────────────────────
    function Modal({ title, children, onClose }) {
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#13131A",border:"1px solid #2A2A3E",borderRadius:16,padding:24,width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:"#F5A623",letterSpacing:1}}>{title}</div>
              <button onClick={onClose} style={{background:"transparent",border:"none",color:"#8A8A9A",fontSize:22,lineHeight:1}}>×</button>
            </div>
            {children}
          </div>
        </div>
      );
    }
    function SectionTitle({ children }) {
      return <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:"#F5A623",letterSpacing:2,marginBottom:16}}>{children}</div>;
    }
    function Label({ children }) {
      return <div style={{fontSize:11,color:"#8A8A9A",marginBottom:4,letterSpacing:0.5,textTransform:"uppercase"}}>{children}</div>;
    }
    function FieldWrap({ children, full }) {
      return <div style={full ? {gridColumn:"1/-1"} : {}}>{children}</div>;
    }

    // ── TOP BAR ──────────────────────────────────────────────────────────────
    function TopBar({ mode, setMode }) {
      return (
        <div style={{background:"#13131A",borderBottom:"1px solid #2A2A3E",padding:"0 20px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,color:"#F5A623",letterSpacing:2}}>VELVET BARREL POS</div>
          <div style={{display:"flex",gap:8}}>
            {["server","dashboard"].map(m => (
              <button key={m} onClick={() => setMode(m)} style={{
                background: mode===m ? "#F5A623" : "transparent",
                color: mode===m ? "#0A0A0F" : "#8A8A9A",
                border:`1px solid ${mode===m ? "#F5A623" : "#2A2A3E"}`,
                borderRadius:8, padding:"6px 16px", fontSize:12, fontWeight:600,
                textTransform:"uppercase", letterSpacing:1,
              }}>
                {m==="server" ? "🍸 Server" : "📊 Dashboard"}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ── PIN SCREEN ───────────────────────────────────────────────────────────
    function PinScreen({ pinInput, setPinInput, onUnlock }) {
      return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 56px)"}}>
          <div style={{background:"#13131A",border:"1px solid #2A2A3E",borderRadius:16,padding:40,width:320,textAlign:"center"}}>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:32,color:"#F5A623",marginBottom:8}}>MANAGER ACCESS</div>
            <p style={{color:"#8A8A9A",fontSize:13,marginBottom:24}}>Enter PIN to unlock dashboard</p>
            <input type="password" value={pinInput}
              onChange={e => setPinInput(e.target.value)}
              onKeyDown={e => e.key==="Enter" && onUnlock()}
              placeholder="••••" maxLength={6}
              style={{textAlign:"center",fontSize:24,letterSpacing:8,marginBottom:16}} />
            <button onClick={onUnlock} style={{width:"100%",background:"#F5A623",color:"#0A0A0F",border:"none",borderRadius:8,padding:"12px 0",fontWeight:700,fontSize:14}}>
              UNLOCK
            </button>
            <p style={{color:"#333",fontSize:11,marginTop:12}}>Default PIN: 1234</p>
          </div>
        </div>
      );
    }

    // ── MENU ITEM CARD ───────────────────────────────────────────────────────
    function MenuItemCard({ item, onAdd }) {
      const [qty, setQty] = useState(1);
      const [unit, setUnit] = useState(item.category==="Liquor" ? "small" : "bottle");
      const isLow = item.qty <= item.lowStockThreshold;
      return (
        <div style={{background:"#1E1E2E",borderRadius:10,padding:"10px 10px 8px",border:`1px solid ${isLow?"#E85D5D44":"#2A2A3E"}`,display:"flex",flexDirection:"column",gap:6}}>
          <div style={{background:"#2A2A3E",borderRadius:6,height:70,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>
            {item.imageUrl
              ? <img src={item.imageUrl} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:6}} />
              : item.category==="Liquor" ? "🥃" : "🥤"
            }
          </div>
          <div style={{fontSize:12,fontWeight:600,lineHeight:1.3}}>{item.name}</div>
          <div style={{fontSize:11,color:"#8A8A9A"}}>{item.category}</div>
          {isLow && <div style={{fontSize:10,color:"#E85D5D",fontWeight:600}}>⚠ LOW STOCK</div>}
          <div style={{fontSize:12,color:"#F5A623",fontFamily:"'JetBrains Mono',monospace"}}>
            {item.category==="Liquor" ? `₹${item.price30ml}/30ml` : `₹${item.priceBottle}/unit`}
          </div>
          {item.category==="Liquor" && (
            <select value={unit} onChange={e => setUnit(e.target.value)} style={{fontSize:11,padding:"4px 6px"}}>
              <option value="small">Small (30ml) ₹{item.price30ml}</option>
              <option value="large">Large (60ml) ₹{item.price30ml*2}</option>
            </select>
          )}
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <button onClick={() => setQty(q => Math.max(1,q-1))} style={{background:"#2A2A3E",border:"none",color:"#E8E8F0",width:24,height:24,borderRadius:5,fontSize:14}}>−</button>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,flex:1,textAlign:"center"}}>{qty}</span>
            <button onClick={() => setQty(q => q+1)} style={{background:"#2A2A3E",border:"none",color:"#E8E8F0",width:24,height:24,borderRadius:5,fontSize:14}}>+</button>
            <button onClick={() => { onAdd(item,qty,unit); setQty(1); }} style={{background:"#F5A623",border:"none",color:"#0A0A0F",padding:"4px 10px",borderRadius:6,fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>ADD</button>
          </div>
        </div>
      );
    }

    // ── SERVER APP ───────────────────────────────────────────────────────────
    function ServerApp({ inventory, orders, setOrders, bills, setBills, tables, getTableStatus, settings, toast }) {
      const [screen, setScreen] = useState("tables");
      const [activeTable, setActiveTable] = useState(null);
      const [customerInfo, setCustomerInfo] = useState({ name:"", phone:"" });
      const [cart, setCart] = useState([]);
      const [search, setSearch] = useState("");
      const [showCustomerModal, setShowCustomerModal] = useState(false);
      const [showBillConfirm, setShowBillConfirm] = useState(false);

      const openTable = table => {
        const status = getTableStatus(table);
        if (status==="billed") { toast("Table is billed – awaiting payment","error"); return; }
        setActiveTable(table);
        const existing = orders.filter(o => o.tableNumber===table && o.status==="open");
        if (!existing.length) {
          setShowCustomerModal(true); setCart([]);
        } else {
          setCustomerInfo({ name:existing[0].customerName, phone:existing[0].customerPhone });
          // rebuild cart from held orders
          const cartMap = {};
          existing.forEach(o => {
            const key = `${o.itemId}-${o.unit}`;
            if (cartMap[key]) { cartMap[key].qty += o.qty; cartMap[key].lineTotal += o.lineTotal; }
            else cartMap[key] = { key, itemId:o.itemId, name:o.itemName, qty:o.qty, unit:o.unit, unitPrice:o.unitPrice, lineTotal:o.lineTotal, category:o.category };
          });
          setCart(Object.values(cartMap));
        }
        setScreen("order");
      };

      const addToCart = (item, qty, unit) => {
        const price = item.category==="Liquor" ? item.price30ml*(unit==="small"?1:2) : item.priceBottle;
        const lineTotal = price * qty;
        const key = `${item.id}-${unit}`;
        setCart(prev => {
          const ex = prev.find(c => c.key===key);
          if (ex) return prev.map(c => c.key===key ? {...c, qty:c.qty+qty, lineTotal:(c.qty+qty)*price} : c);
          return [...prev, { key, itemId:item.id, name:item.name, qty, unit, unitPrice:price, lineTotal, category:item.category }];
        });
        toast(`Added ${item.name} ×${qty}`,"success");
      };

      const removeFromCart = key => setCart(p => p.filter(c => c.key!==key));
      const updateCartQty = (key, delta) => setCart(p =>
        p.map(c => c.key===key ? {...c, qty:Math.max(1,c.qty+delta), lineTotal:Math.max(1,c.qty+delta)*c.unitPrice} : c)
      );

      const subtotal = cart.reduce((a,c) => a+c.lineTotal, 0);
      const gstAmount = subtotal * GST_RATE;
      const total = subtotal + gstAmount;

      const holdOrder = () => {
        const newOrders = cart.map(c => ({
          orderId:`ORD-${Date.now()}-${Math.random().toString(36).slice(2,6).toUpperCase()}`,
          tableNumber:activeTable, customerName:customerInfo.name, customerPhone:customerInfo.phone,
          itemId:c.itemId, itemName:c.name, qty:c.qty, unit:c.unit,
          unitPrice:c.unitPrice, lineTotal:c.lineTotal, category:c.category,
          status:"open",
          date:new Date().toLocaleDateString("en-IN"),
          time:new Date().toLocaleTimeString("en-IN"),
        }));
        setOrders(p => [...p.filter(o => !(o.tableNumber===activeTable && o.status==="open")), ...newOrders]);
        toast("Order saved!","success");
        setScreen("tables");
      };

      const generateBill = () => {
        const billId = `BILL-${Date.now()}`;
        const bill = {
          billId, tableNumber:activeTable,
          customerName:customerInfo.name, customerPhone:customerInfo.phone,
          subtotal, gstAmount, total,
          dateTime:new Date().toLocaleString("en-IN"),
          items:cart.map(c => ({ name:c.name, qty:c.qty, unit:c.unit, rate:c.unitPrice, lineTotal:c.lineTotal, itemId:c.itemId, category:c.category })),
        };
        setBills(p => [...p, bill]);
        setOrders(p => p.map(o => o.tableNumber===activeTable ? {...o,status:"billed"} : o));
        generateBillPDF(bill, settings);
        toast("Bill generated & downloaded!","success");
        setShowBillConfirm(false);
        setScreen("tables");
      };

      const filtered = inventory.filter(i =>
        i.active && (i.name.toLowerCase().includes(search.toLowerCase()) || i.category.toLowerCase().includes(search.toLowerCase()))
      );

      if (screen==="tables") return (
        <div style={{padding:"24px 20px",maxWidth:1200,margin:"0 auto"}}>
          <h2 style={{fontFamily:"'Bebas Neue',cursive",fontSize:28,color:"#F5A623",letterSpacing:2,marginBottom:20}}>TABLE VIEW</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12}}>
            {tables.map(t => {
              const status = getTableStatus(t);
              const c = {
                free:     { bg:"#0F2A0F", border:"#3DD410", text:"#3DD410", label:"FREE"     },
                occupied: { bg:"#2A1A00", border:"#F5A623", text:"#F5A623", label:"OCCUPIED" },
                billed:   { bg:"#2A0A0A", border:"#E85D5D", text:"#E85D5D", label:"BILLED"   },
              }[status];
              return (
                <div key={t} onClick={() => openTable(t)}
                  style={{background:c.bg,border:`2px solid ${c.border}`,borderRadius:12,padding:"24px 16px",textAlign:"center",cursor:"pointer",transition:"transform 0.15s",userSelect:"none"}}
                  onMouseEnter={e => e.currentTarget.style.transform="scale(1.04)"}
                  onMouseLeave={e => e.currentTarget.style.transform="scale(1)"}>
                  <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:36,color:c.text}}>{t}</div>
                  <div style={{fontSize:11,color:c.text,letterSpacing:2,marginTop:4}}>{c.label}</div>
                </div>
              );
            })}
          </div>

          {showCustomerModal && (
            <Modal title={`Table ${activeTable} — Customer Info`} onClose={() => { setShowCustomerModal(false); setScreen("tables"); }}>
              <Label>Customer Name</Label>
              <input value={customerInfo.name} onChange={e => setCustomerInfo(p => ({...p,name:e.target.value}))} placeholder="e.g. Arjun Kumar" style={{marginBottom:12}} />
              <Label>Phone Number</Label>
              <input value={customerInfo.phone} onChange={e => setCustomerInfo(p => ({...p,phone:e.target.value}))} placeholder="9876543210" style={{marginBottom:16}} />
              <button onClick={() => setShowCustomerModal(false)} style={{width:"100%",background:"#F5A623",color:"#0A0A0F",border:"none",borderRadius:8,padding:"10px 0",fontWeight:700}}>
                Start Order
              </button>
            </Modal>
          )}
        </div>
      );

      return (
        <div style={{display:"flex",height:"calc(100vh - 56px)",overflow:"hidden"}}>
          {/* Left: Menu */}
          <div style={{flex:1,overflowY:"auto",padding:"16px 12px",borderRight:"1px solid #2A2A3E"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
              <button onClick={() => setScreen("tables")} style={{background:"transparent",border:"1px solid #2A2A3E",color:"#8A8A9A",borderRadius:8,padding:"6px 12px",fontSize:12}}>← Tables</button>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:"#F5A623",letterSpacing:2}}>TABLE {activeTable}</div>
              <div style={{fontSize:12,color:"#8A8A9A",marginLeft:"auto"}}>{customerInfo.name}</div>
            </div>
            <input placeholder="Search items..." value={search} onChange={e => setSearch(e.target.value)} style={{marginBottom:12}} />
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
              {filtered.map(item => <MenuItemCard key={item.id} item={item} onAdd={addToCart} />)}
            </div>
          </div>

          {/* Right: Cart */}
          <div style={{width:320,display:"flex",flexDirection:"column",background:"#13131A"}}>
            <div style={{padding:"16px 16px 8px",borderBottom:"1px solid #2A2A3E"}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:"#F5A623",letterSpacing:2}}>RUNNING ORDER</div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 12px"}}>
              {cart.length===0
                ? <div style={{textAlign:"center",color:"#8A8A9A",fontSize:13,marginTop:40}}>No items added yet</div>
                : cart.map(c => (
                  <div key={c.key} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #1E1E2E"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500}}>{c.name}</div>
                      <div style={{fontSize:11,color:"#8A8A9A"}}>{c.unit} · ₹{c.unitPrice}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <button onClick={() => updateCartQty(c.key,-1)} style={{background:"#1E1E2E",border:"1px solid #2A2A3E",color:"#E8E8F0",width:24,height:24,borderRadius:6,fontSize:14}}>−</button>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,minWidth:20,textAlign:"center"}}>{c.qty}</span>
                      <button onClick={() => updateCartQty(c.key,1)} style={{background:"#1E1E2E",border:"1px solid #2A2A3E",color:"#E8E8F0",width:24,height:24,borderRadius:6,fontSize:14}}>+</button>
                      <button onClick={() => removeFromCart(c.key)} style={{background:"transparent",border:"none",color:"#E85D5D",fontSize:16,padding:"0 2px"}}>×</button>
                    </div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,minWidth:60,textAlign:"right",color:"#F5A623"}}>₹{c.lineTotal.toFixed(0)}</div>
                  </div>
                ))
              }
            </div>
            <div style={{padding:"12px 16px",borderTop:"1px solid #2A2A3E",background:"#0F0F1A"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#8A8A9A",marginBottom:4}}>
                <span>Subtotal</span><span style={{fontFamily:"'JetBrains Mono',monospace"}}>₹{subtotal.toFixed(0)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#8A8A9A",marginBottom:8}}>
                <span>GST (18%)</span><span style={{fontFamily:"'JetBrains Mono',monospace"}}>₹{gstAmount.toFixed(0)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700,color:"#F5A623",marginBottom:12}}>
                <span>TOTAL</span><span style={{fontFamily:"'JetBrains Mono',monospace"}}>₹{total.toFixed(0)}</span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={holdOrder} disabled={cart.length===0} style={{flex:1,background:"#1E1E2E",border:"1px solid #2A2A3E",color:"#E8E8F0",borderRadius:8,padding:"10px 0",fontSize:12,fontWeight:600}}>HOLD</button>
                <button onClick={() => setShowBillConfirm(true)} disabled={cart.length===0} style={{flex:2,background:"#F5A623",border:"none",color:"#0A0A0F",borderRadius:8,padding:"10px 0",fontSize:12,fontWeight:700}}>GENERATE BILL</button>
              </div>
            </div>
          </div>

          {showBillConfirm && (
            <Modal title="Confirm Bill Generation" onClose={() => setShowBillConfirm(false)}>
              <p style={{color:"#8A8A9A",fontSize:13,marginBottom:16}}>
                Table {activeTable} will be locked after this. Grand Total: <strong style={{color:"#F5A623"}}>₹{total.toFixed(0)}</strong>
              </p>
              <div style={{display:"flex",gap:8}}>
                <button onClick={() => setShowBillConfirm(false)} style={{flex:1,background:"#1E1E2E",border:"1px solid #2A2A3E",color:"#E8E8F0",borderRadius:8,padding:"10px 0",fontSize:13}}>Cancel</button>
                <button onClick={generateBill} style={{flex:2,background:"#F5A623",border:"none",color:"#0A0A0F",borderRadius:8,padding:"10px 0",fontSize:13,fontWeight:700}}>Yes, Generate Bill</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ── OVERVIEW TAB ─────────────────────────────────────────────────────────
    function OverviewTab({ orders, bills, inventory }) {
      const todayStr = new Date().toLocaleDateString("en-IN");
      const todayBills = bills.filter(b => b.dateTime?.includes(todayStr));
      const todayRevenue = todayBills.reduce((a,b) => a+b.total, 0);
      const uniqueOpen = [...new Set(orders.filter(o=>o.status==="open").map(o=>o.tableNumber))].length;
      const lowStock = inventory.filter(i => i.active && i.qty<=i.lowStockThreshold).length;

      const stats = [
        { label:"Today's Revenue", value:`₹${todayRevenue.toLocaleString("en-IN",{maximumFractionDigits:0})}`, color:"#F5A623" },
        { label:"Bills Today",     value:todayBills.length, color:"#3DD410" },
        { label:"Open Tables",     value:uniqueOpen,        color:"#F5A623" },
        { label:"Low Stock Alerts",value:lowStock, color:lowStock>0?"#E85D5D":"#3DD410" },
      ];

      return (
        <div>
          <SectionTitle>Overview</SectionTitle>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:28}}>
            {stats.map(s => (
              <div key={s.label} style={{background:"#13131A",border:"1px solid #2A2A3E",borderRadius:12,padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#8A8A9A",marginBottom:6}}>{s.label}</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:24,fontWeight:500,color:s.color}}>{s.value}</div>
              </div>
            ))}
          </div>
          <SectionTitle>Recent Bills</SectionTitle>
          <div style={{background:"#13131A",border:"1px solid #2A2A3E",borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{borderBottom:"1px solid #2A2A3E"}}>
                  {["Bill ID","Table","Customer","Total","Date"].map(h => (
                    <th key={h} style={{padding:"12px 16px",textAlign:"left",color:"#8A8A9A",fontWeight:500,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {bills.slice(-10).reverse().map(b => (
                  <tr key={b.billId} style={{borderBottom:"1px solid #1E1E2E"}}>
                    <td style={{padding:"10px 16px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#F5A623"}}>{b.billId.slice(0,20)}</td>
                    <td style={{padding:"10px 16px"}}>{b.tableNumber}</td>
                    <td style={{padding:"10px 16px"}}>{b.customerName||"—"}</td>
                    <td style={{padding:"10px 16px",fontFamily:"'JetBrains Mono',monospace",color:"#3DD410"}}>₹{b.total.toFixed(0)}</td>
                    <td style={{padding:"10px 16px",color:"#8A8A9A",fontSize:12}}>{b.dateTime?.split(",")[0]}</td>
                  </tr>
                ))}
                {!bills.length && <tr><td colSpan={5} style={{padding:"20px 16px",textAlign:"center",color:"#8A8A9A"}}>No bills yet today</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── INVENTORY TAB ────────────────────────────────────────────────────────
    function InventoryTab({ inventory, setInventory, settings, toast }) {
      const [showAdd, setShowAdd] = useState(false);
      const [editItem, setEditItem] = useState(null);
      const [form, setForm] = useState({name:"",category:"Liquor",price30ml:"",priceBottle:"",mlPerBottle:750,qty:1,lowStockThreshold:2});
      const [imageFile, setImageFile] = useState(null);
      const [uploading, setUploading] = useState(false);

      const nextId = cat => {
        const prefix = cat==="Liquor" ? "LQ" : "BV";
        const num = String(inventory.filter(i=>i.id.startsWith(prefix)).length+1).padStart(4,"0");
        return `${prefix}-${num}`;
      };

      const openAdd = () => { setEditItem(null); setForm({name:"",category:"Liquor",price30ml:"",priceBottle:"",mlPerBottle:750,qty:1,lowStockThreshold:2}); setShowAdd(true); };
      const openEdit = item => { setEditItem(item); setForm({name:item.name,category:item.category,price30ml:item.price30ml,priceBottle:item.priceBottle,mlPerBottle:item.mlPerBottle,qty:item.qty,lowStockThreshold:item.lowStockThreshold}); setShowAdd(true); };

      const saveItem = async () => {
        if (!form.name) { toast("Item name required","error"); return; }
        setUploading(true);
        let imageUrl = editItem?.imageUrl || "";
        if (imageFile) {
          try { imageUrl = await uploadToGithub(imageFile, editItem?editItem.id:nextId(form.category), settings); }
          catch { toast("Image upload failed","error"); }
        }
        const parsed = { ...form, price30ml:+form.price30ml, priceBottle:+form.priceBottle, mlPerBottle:+form.mlPerBottle, qty:+form.qty, lowStockThreshold:+form.lowStockThreshold, imageUrl };
        if (editItem) {
          setInventory(p => p.map(i => i.id===editItem.id ? {...i,...parsed} : i));
          toast("Item updated!","success");
        } else {
          setInventory(p => [...p, { id:nextId(form.category), ...parsed, active:true }]);
          toast("Item added!","success");
        }
        setUploading(false); setShowAdd(false); setEditItem(null); setImageFile(null);
      };

      const deleteItem = id => {
        if (!confirm("Mark item as inactive?")) return;
        setInventory(p => p.map(i => i.id===id ? {...i,active:false} : i));
        toast("Item removed","info");
      };

      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <SectionTitle>Inventory</SectionTitle>
            <button onClick={openAdd} style={{background:"#F5A623",border:"none",color:"#0A0A0F",borderRadius:8,padding:"8px 18px",fontWeight:700,fontSize:13}}>+ Add Item</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
            {inventory.filter(i=>i.active).map(item => {
              const isLow = item.qty<=item.lowStockThreshold;
              return (
                <div key={item.id} style={{background:"#13131A",border:`1px solid ${isLow?"#E85D5D66":"#2A2A3E"}`,borderRadius:12,padding:"14px 14px 10px",position:"relative"}}>
                  {isLow && <div style={{position:"absolute",top:10,right:10,background:"#E85D5D22",color:"#E85D5D",fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:700}}>LOW STOCK</div>}
                  <div style={{background:"#2A2A3E",borderRadius:8,height:80,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,marginBottom:10,overflow:"hidden"}}>
                    {item.imageUrl
                      ? <img src={item.imageUrl} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover"}} />
                      : item.category==="Liquor" ? "🥃" : "🥤"
                    }
                  </div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#8A8A9A",marginBottom:2}}>{item.id}</div>
                  <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{item.name}</div>
                  <div style={{fontSize:11,color:"#8A8A9A",marginBottom:6}}>{item.category} · {item.mlPerBottle}ml</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:8}}>
                    <div style={{background:"#1E1E2E",borderRadius:6,padding:"4px 8px",fontSize:11}}>
                      <div style={{color:"#8A8A9A"}}>Per 30ml</div>
                      <div style={{color:"#F5A623",fontFamily:"'JetBrains Mono',monospace"}}>₹{item.price30ml}</div>
                    </div>
                    <div style={{background:"#1E1E2E",borderRadius:6,padding:"4px 8px",fontSize:11}}>
                      <div style={{color:"#8A8A9A"}}>Stock</div>
                      <div style={{color:isLow?"#E85D5D":"#3DD410",fontFamily:"'JetBrains Mono',monospace"}}>{typeof item.qty==="number"?item.qty.toFixed(1):item.qty} btl</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={() => openEdit(item)} style={{flex:1,background:"#1E1E2E",border:"1px solid #2A2A3E",color:"#E8E8F0",borderRadius:6,padding:"6px 0",fontSize:11}}>Edit</button>
                    <button onClick={() => deleteItem(item.id)} style={{background:"transparent",border:"1px solid #E85D5D44",color:"#E85D5D",borderRadius:6,padding:"6px 10px",fontSize:11}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>

          {showAdd && (
            <Modal title={editItem?"Edit Item":"Add New Item"} onClose={() => { setShowAdd(false); setEditItem(null); }}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <FieldWrap full>
                  <Label>Item Name</Label>
                  <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Jack Daniel's" />
                </FieldWrap>
                <div>
                  <Label>Category</Label>
                  <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                    <option>Liquor</option><option>Beverage</option>
                  </select>
                </div>
                <div>
                  <Label>ML per Bottle</Label>
                  <input type="number" value={form.mlPerBottle} onChange={e=>setForm(p=>({...p,mlPerBottle:e.target.value}))} />
                </div>
                <div>
                  <Label>Price per 30ml (₹)</Label>
                  <input type="number" value={form.price30ml} onChange={e=>setForm(p=>({...p,price30ml:e.target.value}))} />
                </div>
                <div>
                  <Label>Price per Bottle (₹)</Label>
                  <input type="number" value={form.priceBottle} onChange={e=>setForm(p=>({...p,priceBottle:e.target.value}))} />
                </div>
                <div>
                  <Label>Opening Stock (btl)</Label>
                  <input type="number" value={form.qty} onChange={e=>setForm(p=>({...p,qty:e.target.value}))} />
                </div>
                <div>
                  <Label>Low Stock Threshold</Label>
                  <input type="number" value={form.lowStockThreshold} onChange={e=>setForm(p=>({...p,lowStockThreshold:e.target.value}))} />
                </div>
                <FieldWrap full>
                  <Label>Item Image</Label>
                  <input type="file" accept="image/*" onChange={e=>setImageFile(e.target.files[0])} />
                </FieldWrap>
              </div>
              <button onClick={saveItem} disabled={uploading} style={{width:"100%",background:"#F5A623",border:"none",color:"#0A0A0F",borderRadius:8,padding:"10px 0",fontWeight:700,fontSize:13,opacity:uploading?0.7:1}}>
                {uploading?"Saving...": editItem?"Save Changes":"Add Item"}
              </button>
            </Modal>
          )}
        </div>
      );
    }

    // ── TABLES TAB ───────────────────────────────────────────────────────────
    function TablesTab({ tables, getTableStatus, orders }) {
      return (
        <div>
          <SectionTitle>Table Status</SectionTitle>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
            {tables.map(t => {
              const status = getTableStatus(t);
              const clr = {free:"#3DD410",occupied:"#F5A623",billed:"#E85D5D"}[status];
              const tableOrders = orders.filter(o=>o.tableNumber===t && o.status==="open");
              const running = tableOrders.reduce((a,o)=>a+o.lineTotal,0);
              return (
                <div key={t} style={{background:"#13131A",border:`1px solid ${clr}44`,borderRadius:12,padding:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:28,color:clr}}>{t}</div>
                    <div style={{fontSize:11,background:`${clr}22`,color:clr,padding:"3px 10px",borderRadius:20,alignSelf:"center",fontWeight:600}}>{status.toUpperCase()}</div>
                  </div>
                  {status!=="free" && (
                    <>
                      <div style={{fontSize:12,color:"#8A8A9A",marginBottom:4}}>{tableOrders[0]?.customerName||"—"}</div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,color:"#F5A623"}}>₹{running.toFixed(0)} <span style={{fontSize:11,color:"#8A8A9A"}}>running</span></div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── REPORTS TAB ──────────────────────────────────────────────────────────
    function ReportsTab({ orders, bills }) {
      const totalRevenue = bills.reduce((a,b)=>a+b.total,0);
      const totalGST = bills.reduce((a,b)=>a+b.gstAmount,0);
      const itemTotals = {};
      bills.forEach(b => b.items.forEach(item => {
        if (!itemTotals[item.name]) itemTotals[item.name]={qty:0,revenue:0};
        itemTotals[item.name].qty += item.qty;
        itemTotals[item.name].revenue += item.lineTotal;
      }));
      const topItems = Object.entries(itemTotals).sort((a,b)=>b[1].revenue-a[1].revenue).slice(0,8);

      const exportCSV = () => {
        const header = "Bill ID,Table,Customer,Subtotal,GST,Total,Date\n";
        const rows = bills.map(b=>`${b.billId},${b.tableNumber},${b.customerName},${b.subtotal.toFixed(2)},${b.gstAmount.toFixed(2)},${b.total.toFixed(2)},${b.dateTime}`).join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([header+rows],{type:"text/csv"}));
        a.download = "bills-export.csv"; a.click();
      };

      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <SectionTitle>Reports</SectionTitle>
            <button onClick={exportCSV} style={{background:"transparent",border:"1px solid #2A2A3E",color:"#8A8A9A",borderRadius:8,padding:"6px 14px",fontSize:12}}>⬇ Export CSV</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:28}}>
            {[
              {label:"Total Revenue",value:`₹${totalRevenue.toLocaleString("en-IN",{maximumFractionDigits:0})}`,color:"#F5A623"},
              {label:"Total GST Collected",value:`₹${totalGST.toLocaleString("en-IN",{maximumFractionDigits:0})}`,color:"#3DD410"},
              {label:"Total Bills",value:bills.length,color:"#F5A623"},
            ].map(s => (
              <div key={s.label} style={{background:"#13131A",border:"1px solid #2A2A3E",borderRadius:12,padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#8A8A9A",marginBottom:6}}>{s.label}</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:500,color:s.color}}>{s.value}</div>
              </div>
            ))}
          </div>
          <SectionTitle>Top Selling Items</SectionTitle>
          <div style={{background:"#13131A",border:"1px solid #2A2A3E",borderRadius:12,overflow:"hidden"}}>
            {topItems.length ? topItems.map(([name,data],i) => (
              <div key={name} style={{display:"flex",alignItems:"center",padding:"12px 16px",borderBottom:i<topItems.length-1?"1px solid #1E1E2E":"none"}}>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#333",width:28}}>#{i+1}</div>
                <div style={{flex:1,fontSize:13}}>{name}</div>
                <div style={{fontSize:12,color:"#8A8A9A",marginRight:16}}>{data.qty} units</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",color:"#F5A623",fontSize:13}}>₹{data.revenue.toFixed(0)}</div>
              </div>
            )) : (
              <div style={{padding:"20px 16px",textAlign:"center",color:"#8A8A9A",fontSize:13}}>No data yet</div>
            )}
          </div>
        </div>
      );
    }

    // ── SETTINGS TAB ─────────────────────────────────────────────────────────
    function SettingsTab({ settings, setSettings, toast }) {
      const [form, setForm] = useState({...settings});
      const save = () => { setSettings(form); toast("Settings saved!","success"); };
      const fields = [
        {key:"barName",label:"Bar Name"},
        {key:"barAddress",label:"Address",full:true},
        {key:"gstNumber",label:"GSTIN"},
        {key:"gstRate",label:"GST Rate (%)",type:"number"},
        {key:"tables",label:"Tables (comma-separated)",full:true},
        {key:"currency",label:"Currency Symbol"},
        {key:"githubOwner",label:"GitHub Owner"},
        {key:"githubRepo",label:"GitHub Repo"},
        {key:"githubToken",label:"GitHub Token",type:"password"},
        {key:"logoPath",label:"Logo Path in Repo"},
      ];
      return (
        <div>
          <SectionTitle>Settings</SectionTitle>
          <div style={{background:"#13131A",border:"1px solid #2A2A3E",borderRadius:12,padding:"20px 24px",maxWidth:600}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {fields.map(f => (
                <FieldWrap key={f.key} full={f.full}>
                  <Label>{f.label}</Label>
                  <input type={f.type||"text"} value={form[f.key]||""} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} />
                </FieldWrap>
              ))}
            </div>
            <button onClick={save} style={{marginTop:20,background:"#F5A623",border:"none",color:"#0A0A0F",borderRadius:8,padding:"10px 28px",fontWeight:700,fontSize:13}}>
              Save Settings
            </button>
          </div>
        </div>
      );
    }

    // ── DASHBOARD ────────────────────────────────────────────────────────────
    function Dashboard({ inventory, setInventory, orders, bills, setBills, settings, setSettings, tables, getTableStatus, toast }) {
      const [tab, setTab] = useState("overview");
      const tabs = [
        {id:"overview", icon:"📊"},
        {id:"inventory",icon:"🍾"},
        {id:"tables",   icon:"🪑"},
        {id:"reports",  icon:"📈"},
        {id:"settings", icon:"⚙️"},
      ];
      return (
        <div style={{display:"flex",height:"calc(100vh - 56px)"}}>
          <div style={{width:200,background:"#13131A",borderRight:"1px solid #2A2A3E",padding:"20px 0",display:"flex",flexDirection:"column",gap:4}}>
            {tabs.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                background:tab===t.id?"#F5A62318":"transparent",
                borderLeft:tab===t.id?"3px solid #F5A623":"3px solid transparent",
                border:"none",borderRight:"none",
                color:tab===t.id?"#F5A623":"#8A8A9A",
                padding:"10px 20px",textAlign:"left",fontSize:13,
                fontWeight:tab===t.id?600:400,textTransform:"capitalize",
                cursor:"pointer",letterSpacing:0.5,
              }}>
                {t.icon} {t.id.charAt(0).toUpperCase()+t.id.slice(1)}
              </button>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>
            {tab==="overview"  && <OverviewTab  orders={orders} bills={bills} inventory={inventory} />}
            {tab==="inventory" && <InventoryTab inventory={inventory} setInventory={setInventory} settings={settings} toast={toast} />}
            {tab==="tables"    && <TablesTab    tables={tables} getTableStatus={getTableStatus} orders={orders} />}
            {tab==="reports"   && <ReportsTab   orders={orders} bills={bills} />}
            {tab==="settings"  && <SettingsTab  settings={settings} setSettings={setSettings} toast={toast} />}
          </div>
        </div>
      );
    }

    // ── ROOT APP ─────────────────────────────────────────────────────────────
    function App() {
      const [mode, setMode] = useState("server");
      const [pinInput, setPinInput] = useState("");
      const [pinUnlocked, setPinUnlocked] = useState(false);
      const [inventory, setInventory] = useState(MOCK_INVENTORY);
      const [orders, setOrders] = useState([]);
      const [bills, setBills] = useState([]);
      const [settings, setSettings] = useState(MOCK_SETTINGS);
      const { toasts, toast } = useToast();

      const tables = useMemo(() => settings.tables.split(",").map(t=>t.trim()).filter(Boolean), [settings.tables]);

      const getTableStatus = useCallback(table => {
        const rows = orders.filter(o=>o.tableNumber===table && o.status!=="cancelled");
        if (!rows.length) return "free";
        if (rows.some(o=>o.status==="billed")) return "billed";
        return "occupied";
      }, [orders]);

      const handleModeChange = m => {
        setMode(m);
        if (m==="server") setPinUnlocked(false);
      };

      return (
        <div style={{background:"#0A0A0F",minHeight:"100vh",color:"#E8E8F0"}}>
          <TopBar mode={mode} setMode={handleModeChange} />
          {mode==="server"
            ? <ServerApp inventory={inventory} orders={orders} setOrders={setOrders} bills={bills} setBills={setBills} tables={tables} getTableStatus={getTableStatus} settings={settings} toast={toast} />
            : pinUnlocked
              ? <Dashboard inventory={inventory} setInventory={setInventory} orders={orders} bills={bills} setBills={setBills} settings={settings} setSettings={setSettings} tables={tables} getTableStatus={getTableStatus} toast={toast} />
              : <PinScreen pinInput={pinInput} setPinInput={setPinInput} onUnlock={() => { if(pinInput==="1234"){setPinUnlocked(true);}else toast("Wrong PIN","error"); }} />
          }
          <ToastContainer toasts={toasts} />
        </div>
      );
    }

    // ── MOUNT ─────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
